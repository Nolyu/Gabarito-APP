<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabaritoApp — Entrar</title>
<style>
  :root { --azul:#2563eb; --azul-esc:#1d4ed8; --texto:#1e293b; --borda:#e2e8f0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(160deg,#eff6ff,#dbeafe);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:16px;
  }
  .card {
    background:white; border-radius:20px; padding:32px 24px;
    width:100%; max-width:400px; box-shadow:0 8px 30px rgba(0,0,0,0.1);
  }
  .logo { text-align:center; margin-bottom:24px; }
  .logo h1 { font-size:1.6rem; color:var(--azul); }
  .logo p { color:#64748b; font-size:0.85rem; margin-top:4px; }
  label { font-size:0.85rem; font-weight:600; color:var(--texto); display:block; margin-bottom:5px; }
  input {
    width:100%; padding:13px; border:1.5px solid var(--borda); border-radius:12px;
    font-size:1rem; margin-bottom:14px;
  }
  input:focus { outline:none; border-color:var(--azul); }
  .btn {
    width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem;
    font-weight:700; cursor:pointer; background:var(--azul); color:white;
  }
  .btn:hover { background:var(--azul-esc); }
  .toggle { text-align:center; margin-top:16px; font-size:0.88rem; color:#64748b; }
  .toggle a { color:var(--azul); font-weight:600; cursor:pointer; text-decoration:none; }
  .erro {
    background:#fee2e2; color:#dc2626; padding:12px; border-radius:10px;
    font-size:0.88rem; margin-bottom:14px; display:none;
  }
  .campo-nome { display:none; }
  .modo-cadastro .campo-nome { display:block; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <h1>📋 GabaritoApp</h1>
    <p>Correção automática de provas</p>
  </div>
  <div class="erro" id="erro"></div>
  <div class="campo-nome">
    <label>Seu nome</label>
    <input type="text" id="nome" placeholder="Ex: Fred Vilanova">
  </div>
  <label>Email</label>
  <input type="email" id="email" placeholder="seu@email.com">
  <label>Senha</label>
  <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
  <button class="btn" id="btn-acao" onclick="submeter()">Entrar</button>
  <div class="toggle">
    <span id="toggle-texto">Não tem conta?</span>
    <a onclick="alternarModo()" id="toggle-link">Cadastre-se</a>
  </div>
</div>
<script>
let modoCadastro = false;

function alternarModo() {
  modoCadastro = !modoCadastro;
  document.getElementById('card').classList.toggle('modo-cadastro', modoCadastro);
  document.getElementById('btn-acao').textContent = modoCadastro ? 'Criar conta' : 'Entrar';
  document.getElementById('toggle-texto').textContent = modoCadastro ? 'Já tem conta?' : 'Não tem conta?';
  document.getElementById('toggle-link').textContent = modoCadastro ? 'Entrar' : 'Cadastre-se';
  document.getElementById('erro').style.display = 'none';
}

async function submeter() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const nome = document.getElementById('nome').value.trim();
  const rota = modoCadastro ? '/api/registrar' : '/api/login';
  const body = modoCadastro ? {nome, email, senha} : {email, senha};

  try {
    const res = await fetch(rota, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.erro) throw new Error(data.erro);
    window.location.href = '/dashboard';
  } catch(e) {
    const el = document.getElementById('erro');
    el.textContent = e.message;
    el.style.display = 'block';
  }
}

document.getElementById('senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') submeter();
});
</script>
</body>
</html>
